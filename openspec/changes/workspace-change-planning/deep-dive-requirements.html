<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Deep Dive: Workspace Change Planning Requirements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500&family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap">
<style>
  :root {
    --sans:  'Source Sans Pro', system-ui, sans-serif;
    --serif: 'Source Serif 4', Georgia, serif;
    --mono:  'Google Sans Code', ui-monospace, SFMono-Regular, Menlo, monospace;

    --bg:            #faf9f7;
    --surface:       #f2f0eb;
    --surface-2:     #ece9e2;
    --border:        #e3e0d8;
    --border-strong: #ccc9bf;
    --ink:    #1a1917;
    --ink-2:  #4a4843;
    --ink-3:  #8a8780;

    --accent:       #c4580a;
    --accent-hover: #a84908;
    --accent-bg:    #fdf1e8;

    --sage:        #7a8f4a;
    --sage-bg:     #f3f5ea;

    --dark:           #18171a;
    --dark-ink:       #f0ede8;
    --dark-ink-muted: #c3c2b1;
    --dark-border:    #332f3e;

    /* Legacy alias kept so the JS inline() code-block style continues to read */
    --code-bg: var(--surface);

    --radius: 4px;
    --rule: 1px solid var(--border);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  html { font-size: 20px; background: var(--bg); color: var(--ink); }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    font-size: 0.8rem; /* 16px effective base for app chrome */
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::selection { background: var(--accent-bg); color: var(--ink); }

  /* ---------- Eyebrow + section-rule patterns ---------- */
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    line-height: 1;
  }
  .eyebrow::after {
    content: "";
    display: block;
    width: 2.5rem;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }
  .section-rule {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-3);
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0 0 1rem;
  }
  .section-rule::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---------- Header ---------- */
  header {
    padding: 0.7rem 1.25rem;
    border-bottom: var(--rule);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-shrink: 0;
  }
  .title-block { display: flex; flex-direction: column; gap: 4px; }
  .title-block h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: -0.005em;
    line-height: 1.2;
    color: var(--ink);
  }
  .title-block .sub {
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink-2);
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  .nav-btn:hover:not(:disabled) {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-counter {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    padding: 0 4px;
    min-width: 64px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .progress-track {
    width: 140px;
    height: 2px;
    background: var(--border);
    border-radius: 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.25s;
  }
  .progress-label {
    font-size: 10px;
    color: var(--ink-3);
    margin-left: 6px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .copy-all-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    cursor: pointer;
    line-height: 1;
    transition: background 0.12s, border-color 0.12s;
  }
  .copy-all-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  /* ---------- Main layout ---------- */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 270px 1fr;
    min-height: 0;
  }

  /* ---------- Sidebar (req list) ---------- */
  .sidebar {
    background: var(--bg);
    border-right: var(--rule);
    overflow-y: auto;
    padding: 1.25rem 0 1rem;
  }
  .sidebar-head {
    padding: 0 1.1rem 0.85rem;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .sidebar-head::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  /* Sidebar row: hairline top + mono number + serif name + arrow */
  .req-item {
    border-top: var(--rule);
    display: grid;
    grid-template-columns: 38px 1fr 16px;
    column-gap: 0.6rem;
    align-items: center;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    position: relative;
    transition: background 0.12s;
  }
  .req-item:hover { background: var(--surface); }
  .req-item:hover .req-arr { color: var(--accent); transform: translateX(3px); }
  .req-item::after {
    /* sliding arrow */
    content: "→";
    grid-column: 3;
    font-family: var(--mono);
    color: var(--border-strong);
    font-size: 14px;
    transition: color 0.12s, transform 0.15s;
  }
  .req-item:hover::after { color: var(--accent); transform: translateX(3px); }
  .req-item.active { background: var(--accent-bg); }
  .req-item.active::after { color: var(--accent); }
  .req-item.active .req-name { color: var(--ink); }
  .req-item.active .req-num  { color: var(--accent); }

  /* Status dot anchored as a tiny corner mark, doesn't fight the row grid */
  .req-dot {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: transparent;
  }
  .req-dot.clear      { background: var(--sage); }
  .req-dot.needs-work { background: var(--accent); }
  .req-dot.unclear    { background: var(--border-strong); }
  .req-dot.reject     { background: var(--ink); }

  .req-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    text-align: right;
    letter-spacing: 0.05em;
    align-self: center;
  }
  .req-name {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 0.9rem;
    line-height: 1.3;
    color: var(--ink-2);
  }

  /* ---------- Content panel ---------- */
  .content {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .content-inner {
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    padding: 2.5rem 2.2rem 2.5rem;
  }
  .req-header {
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: var(--rule);
  }
  .req-eyebrow {
    /* same as .eyebrow but standalone block */
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    line-height: 1;
  }
  .req-eyebrow::after {
    content: "";
    display: block;
    width: 2.5rem;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }
  .req-title {
    font-family: var(--serif);
    font-weight: 400;
    font-variation-settings: "opsz" 60;
    font-size: clamp(2rem, 4.6vw, 3rem);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin: 0 0 0.9rem;
    color: var(--ink);
  }
  .req-meta {
    font-family: var(--mono);
    color: var(--ink-3);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  /* ---------- Tabs (joined-segment chips) ---------- */
  .tabs {
    display: flex;
    gap: 0;
    margin: 0 0 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
    background: var(--bg);
    border: 1px solid var(--border);
    border-right: none;
    padding: 9px 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    line-height: 1;
    transition: color 0.12s, background 0.12s;
    position: relative;
  }
  .tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .tab:last-child  { border-right: 1px solid var(--border); border-radius: 0 var(--radius) var(--radius) 0; }
  .tab:hover { color: var(--ink); background: var(--surface); }
  .tab.active {
    color: var(--accent);
    background: var(--accent-bg);
  }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--accent);
  }
  .tab .badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    color: var(--ink-3);
    background: transparent;
    border-radius: 0;
    padding: 0;
    letter-spacing: 0.05em;
    min-width: 12px;
    text-align: center;
  }
  .tab.active .badge { color: var(--accent); }
  .kbd {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 400;
    color: var(--ink-3);
    background: transparent;
    padding: 0;
    border: none;
    margin-left: 2px;
    opacity: 0.7;
  }
  .tab.active .kbd { color: var(--accent); opacity: 0.8; }

  /* ---------- Tab panels ---------- */
  .tab-panel {
    padding: 0;
    display: none;
    animation: fadeIn 0.18s ease-out;
  }
  .tab-panel.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: none; }
  }

  /* Statement panel — mono on cream surface card with hairline */
  .statement-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.4rem 1.6rem;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 400;
    line-height: 1.75;
    color: var(--ink-2);
    white-space: pre-wrap;
  }
  .statement-block .src {
    font-family: var(--mono);
    color: var(--ink-3);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-top: 1.1rem;
    padding-top: 0.9rem;
    border-top: var(--rule);
  }

  /* Plain English panel — pull quote with 2px left rule, italic serif */
  .plain-block {
    padding: 0.25rem 0 0.25rem 1.6rem;
    border-left: 2px solid var(--border-strong);
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.05rem, 2.4vw, 1.35rem);
    line-height: 1.55;
    color: var(--ink-2);
  }

  /* Scenarios panel — two cards side by side, hairline borders, low-sat accents */
  .scenarios {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.1rem;
  }
  .scenario-card {
    border-radius: var(--radius);
    padding: 1.2rem 1.3rem 1.3rem;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .scenario-card.compliant { border-color: var(--border); }
  .scenario-card.violation { border-color: var(--border); }

  .scenario-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--ink-3);
  }
  .scenario-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .scenario-card.compliant .scenario-label { color: var(--sage); }
  .scenario-card.compliant .scenario-label::after { background: var(--sage); opacity: 0.4; }
  .scenario-card.violation .scenario-label { color: var(--accent); }
  .scenario-card.violation .scenario-label::after { background: var(--accent); opacity: 0.4; }

  .scenario-body {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 0.82rem;
    line-height: 1.65;
    color: var(--ink-2);
  }

  /* Question / Implication lists — editorial row pattern */
  .item-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .item-list li {
    border-top: var(--rule);
    padding: 1rem 0.25rem 1rem 0;
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.55;
    color: var(--ink-2);
    display: grid;
    grid-template-columns: 38px 1fr;
    column-gap: 1rem;
    align-items: baseline;
  }
  .item-list li:last-child { border-bottom: var(--rule); }
  .item-list li .idx {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-align: right;
  }
  /* No more colored left bars — keep variants but neutralize */
  .item-list.implications li,
  .item-list.questions li { border-left: none; background: transparent; }

  /* Tensions — hairline card, mono "with" header rule, italic serif body */
  .tension-card {
    border-top: var(--rule);
    padding: 1.1rem 0;
  }
  .tension-card:last-child { border-bottom: var(--rule); }
  .tension-with {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 0.7rem;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
  }
  .tension-arrow {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
  }
  .tension-link {
    background: transparent;
    color: var(--accent);
    padding: 0;
    border-radius: 0;
    font-size: 10px;
    cursor: pointer;
    border: none;
    border-bottom: 1px solid var(--accent);
    font-family: var(--mono);
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
    padding-bottom: 2px;
    transition: color 0.12s, border-color 0.12s;
  }
  .tension-link:hover { color: var(--accent-hover); border-bottom-color: var(--accent-hover); }
  .tension-link.unknown {
    color: var(--ink-3);
    border-bottom-color: var(--border-strong);
    cursor: default;
  }
  .tension-link.unknown:hover {
    color: var(--ink-3);
    border-bottom-color: var(--border-strong);
  }
  .tension-body {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 400;
    line-height: 1.6;
    color: var(--ink-2);
  }

  /* Acceptance — pull quote */
  .acceptance-block {
    padding: 0.25rem 0 0.25rem 1.6rem;
    border-left: 2px solid var(--border-strong);
  }
  .acceptance-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .acceptance-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }
  #panel-acceptance {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    line-height: 1.55;
    color: var(--ink-2);
  }

  /* ---------- Review bar ---------- */
  .review-bar {
    background: var(--bg);
    border-top: var(--rule);
    padding: 0.9rem 1.5rem;
    flex-shrink: 0;
  }
  .review-row {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    max-width: 1100px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .review-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
  }
  .review-label::after {
    content: "";
    display: block;
    width: 1.5rem;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  /* Status group — joined-segment chips */
  .status-group {
    display: flex;
    gap: 0;
  }
  .status-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--ink-3);
    padding: 7px 12px;
    border-radius: 0;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    position: relative;
    transition: color 0.12s, background 0.12s;
  }
  .status-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .status-btn:last-child  { border-right: 1px solid var(--border); border-radius: 0 var(--radius) var(--radius) 0; }
  .status-btn::before {
    /* indicator dot per status */
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border-strong);
  }
  .status-btn[data-status="clear"]::before      { background: var(--sage); }
  .status-btn[data-status="needs-work"]::before { background: var(--accent); }
  .status-btn[data-status="unclear"]::before    { background: var(--border-strong); }
  .status-btn[data-status="reject"]::before     { background: var(--ink); }

  .status-btn:hover { color: var(--ink); background: var(--surface); }
  .status-btn.active {
    color: var(--accent);
    background: var(--accent-bg);
  }
  .status-btn.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--accent);
  }

  .review-notes {
    flex: 1;
    min-width: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 0.85rem;
    line-height: 1.4;
  }
  .review-notes::placeholder {
    color: var(--ink-3);
    font-style: italic;
    font-family: var(--serif);
  }
  .review-notes:focus {
    outline: none;
    border-color: var(--accent);
  }

  .copy-one-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink-2);
    padding: 8px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  .copy-one-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg);
    color: var(--ink);

  // ---- App state ----

    s += `Source: ${r.lineRef} (candidate-requirements.md)\n`;
    s += `Status: ${rv.status || "not yet reviewed"}\n`;
    if (rv.notes.trim()) s += `Notes: ${rv.notes.trim()}\n`;
    return s;
  }
  document.getElementById("copyOneBtn").addEventListener("click", () => {
    copyText(buildReviewText(current));
  });
  document.getElementById("copyAllBtn").addEventListener("click", () => {
    const reviewed = REQUIREMENTS.filter(r => reviews[r.id].status || reviews[r.id].notes.trim());
    if (reviewed.length === 0) {
      showToast("Nothing reviewed yet");
      return;
    }
    let s = `# Review: candidate-requirements.md\n\n`;
    s += `Reviewed ${reviewed.length} of ${REQUIREMENTS.length} requirements.\n\n`;
    const byStatus = { clear: [], "needs-work": [], unclear: [], reject: [] };
    reviewed.forEach(r => {
      const status = reviews[r.id].status;
      if (status) byStatus[status].push(r);
    });
    ["clear", "needs-work", "unclear", "reject"].forEach(st => {
      if (byStatus[st].length === 0) return;
      const label = { clear: "Clear", "needs-work": "Needs Work", unclear: "Unclear", reject: "Reject" }[st];
      s += `## ${label} (${byStatus[st].length})\n\n`;
      byStatus[st].forEach(r => {
        s += `- **R${r.id}** ${r.name}`;
        if (reviews[r.id].notes.trim()) s += ` — ${reviews[r.id].notes.trim()}`;
        s += `\n`;
      });
      s += `\n`;
    });
    const notesOnly = reviewed.filter(r => !reviews[r.id].status && reviews[r.id].notes.trim());
    if (notesOnly.length > 0) {
      s += `## Notes only (no status set)\n\n`;
      notesOnly.forEach(r => {
        s += `- **R${r.id}** ${r.name} — ${reviews[r.id].notes.trim()}\n`;
      });
    }
    copyText(s);
  });

  // ---- Initial render ----
  renderRequirement();
</script>
</body>
</html>
