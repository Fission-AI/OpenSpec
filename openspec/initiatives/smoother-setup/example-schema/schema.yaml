name: initiative
version: 1
description: >-
  A workflow that keeps the "who and why" next to the "what". It produces a
  one-pager, a persona, a decision record, a spec, and a task list. Copy this
  folder into openspec/schemas/initiative/ to use it, then create a change with
  --schema initiative.

artifacts:
  - id: one-pager
    generates: one-pager.md
    description: The brief — why this work, and what it is, at a glance
    template: one-pager.md
    requires: []
    instruction: |
      Write a one-page brief: the problem, who it is for, what we will do, and
      what is out of scope. Keep it to a page.

  - id: persona
    generates: persona.md
    description: Who we are building for
    template: persona.md
    requires:
      - one-pager
    instruction: |
      Describe one kind of user: who they are, what they want, and what gets in
      their way. Keep it short and real.

  - id: adr
    generates: adr.md
    description: A key decision and why
    template: adr.md
    requires:
      - persona
    instruction: |
      Record one decision: the context, the choice, and the trade-offs. One
      decision per record.

  - id: spec
    generates: "specs/**/*.md"
    description: What the system should do
    template: spec.md
    requires:
      - adr
    instruction: |
      Write the behavior as requirements and scenarios. Each requirement needs
      at least one scenario. Scenarios use four hashtags (####).

  - id: tasks
    generates: tasks.md
    description: The work to do
    template: tasks.md
    requires:
      - spec
    instruction: |
      Break the work into small, checkable tasks. Order them so earlier tasks
      unblock later ones.

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Work through the tasks and check them off as you go.
