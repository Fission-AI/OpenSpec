name: atd-sdlc-lite
version: 1
description: ATD lightweight workflow for low-risk corrections - ticket → analysis → tasks
artifacts:
  - id: ticket
    generates: ticket.md
    description: Compact ticket intake for a low-risk correction
    template: ticket.md
    instruction: |
      Create the compact ticket document for a low-risk correction. This is the
      lite schema: the change was routed here by triage (see `triage.md`) because
      it restores existing intended behavior with localized impact. Keep the
      document short — same required data as the full schema, less prose.

      Change names use the Jira ticket key (e.g. `abc-1234-add-export`). Derive the
      ticket key from the change name.

      **Intake:**
      1. Pull the Jira issue and ALL linked Confluence pages via the Atlassian MCP.
      2. If the Atlassian MCP is unavailable, ask the developer to paste the ticket
         content and continue with the same checklist below.
      3. Record in ticket.md: the normalized problem statement, acceptance criteria
         with stable IDs (AC-1, AC-2, …), affected systems, and links to the Jira
         issue and every Confluence source.

      **Triage record (mandatory gate):**
      A sidecar is STRUCTURALLY complete when `triage.md` contains a
      recommendation, the developer's confirmed choice, and an evaluation for
      every eligibility condition listed below. Structural completeness is not
      enough — lite processing may continue ONLY when all three hold:
      - every condition evaluation is a pass (no FAIL, no UNCERTAIN), and
      - the recommendation is `atd-sdlc-lite`, and
      - the confirmed choice is `atd-sdlc-lite`.
      When all three hold, fold the routing record (recommendation, condition
      evaluations, confirmed choice) into ticket.md and continue. If any
      evaluation is FAIL or UNCERTAIN, or the recommendation or confirmed
      choice is not `atd-sdlc-lite`, inform the developer, append the
      escalation to `triage.md`, and switch the change's `.openspec.yaml` to
      `schema: atd-sdlc` before proceeding.

      If the sidecar is missing, empty, or structurally incomplete, treat it
      exactly like a missing record — the change bypassed triage — and run the
      eligibility evaluation now, before intake continues: perform a bounded
      codebase preflight (owning component, entry points and call path,
      covering tests/specs, impact check), evaluate every condition below,
      write `triage.md` with the evaluations marked "self-triage at ticket
      intake", and apply the same gate to the result. Lite processing without
      a valid, all-pass triage record is never allowed.

      Eligibility conditions — ALL must pass; classification is risk-based,
      never line count (a one-line change to an authorization condition, SQL
      WHERE clause, or financial calculation is full regardless of size):
      1. Single repository and single component
      2. Small, localized file impact
      3. Restores existing intended behavior (no new behavior)
      4. Existing acceptance criteria, specification, or test already defines the behavior
      5. No API contract change
      6. No database/schema/data migration
      7. No authentication, authorization, security, privacy, or compliance impact
      8. No cross-service integration behavior change
      9. No new dependency
      10. No deployment or infrastructure change
      11. Straightforward automated regression test exists or is easy to add
      12. Trivial rollback
      13. No new functional or technical documentation needed (localized
          corrections to existing docs stay lite-eligible)

      **Branch alignment (advisory):**
      Compare the current git branch name with the ticket key. If the branch does not
      reference the key, suggest creating or switching to a branch named after the
      ticket (e.g. `abc-1234-add-export`). This is a suggestion only — never block,
      and never create or switch branches without explicit developer confirmation.
      Record the branch used (and any declined suggestion) in ticket.md.

      **Restored behavior (lite-specific, mandatory):**
      Record an explicit confirmation of WHICH existing intended behavior this
      change restores. A lite change never introduces new behavior — if it does,
      it does not belong in this schema; escalate via the analysis artifact.

      **Completeness checklist (gate):**
      - Problem statement
      - Acceptance criteria
      - Affected systems
      - Edge cases
      - Constraints
      - Out-of-scope

      **Grilling protocol (when any checklist item is missing):**
      - First explore the codebase for answers. A question the code can answer
        (e.g. which module owns the behavior) is answered by reading the code,
        never asked.
      - Otherwise ask the developer EXACTLY ONE question at a time, and attach a
        recommended answer to every question.
      - Loop until the checklist passes.
      - Record the question/answer trace in ticket.md under "Clarified Requirements".
      - If the ticket is already adequate, the checklist passes trivially — do not
        interrogate for its own sake.

      **Jira write-back (confirmed, idempotent):**
      After grilling produced clarified requirements, OFFER to update the Jira issue.
      Proceed only after the developer confirms. Write into a clearly delimited
      managed section of the issue description:

          ---- OPENSPEC MANAGED SECTION (auto-generated, do not edit) ----
          ...clarified requirements...
          ---- END OPENSPEC MANAGED SECTION ----

      Re-runs replace ONLY the managed section and never touch human-authored
      content. Note the update in ticket.md. If the developer declines, or the
      project's `rules: ticket:` config disables write-back, record clarified
      requirements only in ticket.md.
    requires: []

  - id: analysis
    generates: analysis.md
    description: Short impact assessment with lite-eligibility justification
    template: analysis.md
    instruction: |
      Create the short impact assessment. Same evidence standards as the full
      schema, scoped to a correction — this document must satisfy the full
      schema's content contract so escalation retains it without regeneration.

      **Code is the source of truth.** Derive current behavior from the code itself.
      Documentation (Confluence, comments, wikis) is a hint to verify against code.
      When documentation and code disagree, record the code's behavior as current
      truth and list the discrepancy for the developer. Business rules found in code
      that no documentation mentions are captured with their citation.

      **Evidence:**
      - Record the repository commit SHA once at the top of the document.
      - Every claim about existing behavior carries a `file:line` citation
        (e.g. `src/orders/service.py:120-141`).
      - Name the affected stacks from the explicit set:
        {python, spring-boot, oracle-ebs, angular}. The apply phase maps these to
        standards specs, so this list is mandatory.

      **Required content:**
      - Root cause of the defect, with citation.
      - Target files for the correction.
      - The existing acceptance criteria, specification, or test that covers the
        intended behavior.
      - Risk assessment.
      - Why this change qualifies for lite processing — re-confirm the condition
        evaluations recorded in `triage.md` against what the analysis found.

      **Escalation check (mandatory, before tasks are created):**
      If the assessment uncovers ANY full-workflow trigger — API contract change,
      database/schema/data migration, authentication/authorization/security/
      privacy/compliance impact, cross-service integration behavior, new
      dependency, deployment or infrastructure change, new behavior rather than
      restoration, or a needed new solution document — STOP:
      1. Inform the developer of the trigger.
      2. Append an escalation entry to `triage.md`: the trigger discovered,
         previous schema (atd-sdlc-lite), new schema (atd-sdlc), and reason.
      3. Edit the change's `.openspec.yaml` metadata to `schema: atd-sdlc`.
      4. The completed ticket.md and analysis.md are retained — they satisfy the
         full schema's contract. Subsequent commands reread the schema metadata:
         specs and design become ready; solution-doc and tasks stay blocked.
      Downgrading a full change to lite is not supported.
    requires:
      - ticket

  - id: tasks
    generates: tasks.md
    description: Standard lite task checklist
    template: tasks.md
    instruction: |
      Create the lite task list. Standard shape, in this order:

      1. Implement the correction (name target files from analysis.md; reference
         the AC IDs served).
      2. Add or update a regression test covering the restored behavior.
      3. Run the relevant verification command and record the result.
      4. One standards check per affected stack in analysis.md, naming the mapped
         spec: python → python-service-standards,
         spring-boot → spring-boot-standards,
         oracle-ebs → oracle-ebs-plsql-standards, angular → angular-standards.
      5. Documentation impact: record "no new solution document or durable
         documentation set is needed" — applying localized corrections to
         existing documentation is allowed and noted here. If a NEW document
         turns out to be needed, that is a full-workflow trigger: escalate
         (see apply instruction) instead of writing it under lite.
      6. Add an idempotent Jira closure comment: summary of the correction and
         verification evidence; re-runs update the existing closure comment
         instead of posting a duplicate.

      Every task states its verification (test command, CLI invocation, or
      observable output).
    requires:
      - analysis

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Before implementing ANY task: fetch the standards spec mapped to each stack
    listed in analysis.md from the atd-standards store —
    python → python-service-standards, spring-boot → spring-boot-standards,
    oracle-ebs → oracle-ebs-plsql-standards, angular → angular-standards —
    and conform to it while writing code.

    Work through the checklist in order, mark each checkbox complete as you go.

    **Late escalation (full-workflow trigger found after tasks.md exists or
    during apply):** continuing under lite is unsafe. STOP:
    1. Stop implementation; leave further lite checkboxes unchecked.
    2. Move `tasks.md` to `tasks.lite.md` as audit history — the tracked
       tasks.md path must be absent so the full schema's tasks artifact is not
       falsely complete.
    3. Append an escalation entry to `triage.md`: trigger, previous schema
       (atd-sdlc-lite), new schema (atd-sdlc), reason.
    4. Update ticket.md and analysis.md for the wider scope.
    5. Edit the change's `.openspec.yaml` metadata to `schema: atd-sdlc`.
    6. Continue under the full schema: specs and design become ready;
       solution-doc and tasks are blocked; apply is blocked until a new full
       tasks.md exists. The regenerated full task list MUST account for any
       partial implementation — verify, reconcile, or revert it.
