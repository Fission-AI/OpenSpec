version: 2

updates:
  # Published CLI package
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Documentation site (not published to npm)
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    groups:
      website-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # CI workflow actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
