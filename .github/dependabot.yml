version: 2

updates:
  # Published CLI package
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Let a freshly published version sit before adopting it. Security updates
    # ignore the cooldown, so this only delays routine bumps — long enough for a
    # compromised release to be yanked before it reaches this repo.
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Documentation site (not published to npm)
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    # Let a freshly published version sit before adopting it. Security updates
    # ignore the cooldown, so this only delays routine bumps — long enough for a
    # compromised release to be yanked before it reaches this repo.
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    groups:
      website-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # CI workflow actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Actions are not semver-versioned the way packages are, so this ecosystem
    # accepts default-days only.
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
